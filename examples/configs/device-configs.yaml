# Example device configuration files for the Cisco Virtual Kubelet.
#
# These files describe the DEVICE only.  Runtime settings (node name, IP)
# are supplied via CLI flags or environment variables:
#
#   --nodename / VKUBELET_NODE_NAME      Kubernetes node name (default: cisco-vk-<device-address>)
#   Node InternalIP is derived from device.address
#
# Driver-specific networking lives under the driver key (e.g. "xe:").

---
# Example 1: VirtualPortGroup with DHCP
device:
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  xe:
    networking:
      interface:
        type: VirtualPortGroup
        virtualPortGroup:
          dhcp: true
          interface: "0"
          guestInterface: 0

---
# Example 2: VirtualPortGroup with static IP from podCIDR
device:
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  podCIDR: "10.0.0.0/24"
  xe:
    networking:
      interface:
        type: VirtualPortGroup
        virtualPortGroup:
          dhcp: false
          interface: "0"
          guestInterface: 0

---
# Example 3: AppGigabitEthernet access with DHCP
device:
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  xe:
    networking:
      interface:
        type: AppGigabitEthernet
        appGigabitEthernet:
          mode: access
          dhcp: true
          guestInterface: 0

---
# Example 4: AppGigabitEthernet trunk with static IP from podCIDR
device:
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  podCIDR: "10.0.0.0/24"
  xe:
    networking:
      interface:
        type: AppGigabitEthernet
        appGigabitEthernet:
          mode: trunk
          vlanIf:
            dhcp: false
            vlan: 200
            guestInterface: 0

---
# Example 5: AppGigabitEthernet trunk with DHCP
device:
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  xe:
    networking:
      interface:
        type: AppGigabitEthernet
        appGigabitEthernet:
          mode: trunk
          vlanIf:
            dhcp: true
            vlan: 200
            guestInterface: 0

---
# Example 6: Management with DHCP
device:
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  xe:
    networking:
      interface:
        type: Management
        management:
          dhcp: true
          guestInterface: 0

---
# Example 7: Management with static IP from podCIDR
device:
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  podCIDR: "10.0.0.0/24"
  xe:
    networking:
      interface:
        type: Management
        management:
          dhcp: false
          guestInterface: 0