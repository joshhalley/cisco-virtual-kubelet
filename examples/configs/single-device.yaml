# Single Device Configuration Example
# Use this template for a Catalyst 8000V deployment with DHCP networking

device:
  name: cat8kv-router
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  networking:
    dhcpEnabled: true
    virtualPortGroup: "0"
    defaultVRF: ""

kubelet:
  node_name: "cat8kv-node"
  node_internal_ip: "192.168.1.100"