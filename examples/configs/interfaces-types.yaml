---
# Example 1: VirtualPortGroup with DHCP
device:
  name: cat8kv-router
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  networking:
    interface:
      type: VirtualPortGroup
      virtualPortGroup:
        dhcp: true
        interface: "0"
        guestInterface: 0

kubelet:
  node_name: "cat8kv-node"
  node_internal_ip: "192.168.1.100"

---
# Example 2: VirtualPortGroup with static IP from podPrefix
device:
  name: cat8kv-router
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  networking:
    podPrefix: "10.0.0.0/24"
    interface:
      type: VirtualPortGroup
      virtualPortGroup:
        dhcp: false
        interface: "0"
        guestInterface: 0

kubelet:
  node_name: "cat8kv-node"
  node_internal_ip: "192.168.1.100"

---
# Example 3: AppGigabitEthernet access with DHCP
device:
  name: cat8kv-router
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  networking:
    interface:
      type: AppGigabitEthernet
      appGigabitEthernet:
        mode: access
        vlanIf:
          dhcp: true
          guestInterface: 0

kubelet:
  node_name: "cat8kv-node"
  node_internal_ip: "192.168.1.100"

---
# Example 4: AppGigabitEthernet access with static IP from podPrefix
