# Pre-merge device validation on Cat8kv (Tier 2).
#
# Every PR: build the PR's CVK on ubuntu12, upgrade the single shared
# `cvk` helm release in `cvk-system` to the PR's image, reconcile a
# CiscoDevice against 192.0.2.60, and assert hello-app Pod reaches
# Ready. All CVK/docker/helm work stays on ubuntu12 per the hard-split
# rule; the self-hosted runner on svr-xl orchestrates.
#
# Shared-release rationale: the chart creates cluster-scoped
# ClusterRole `cisco-virtual-kubelet-controller` by a fixed name —
# two concurrent helm releases cannot both own it. Instead a single
# `cvk` release lives in `cvk-system` and each PR `helm upgrade
# --install`s it to its own image tag. Per-PR isolation is at the
# image-tag + CiscoDevice + Pod level, not the release.

name: Lab CI (Cat8kv)

on:
  pull_request:
    branches: [main]
  # Triggered by the upstream-PR bridge (scripts/upstream-pr-bridge.sh
  # running on svr-xl) for each new head SHA on open PRs against
  # cisco-open/cisco-virtual-kubelet. `upstream_sha` is the commit to
  # check out; the others are passed through for status reporting.
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "upstream repo (owner/repo), e.g. cisco-open/cisco-virtual-kubelet"
        required: false
        default: ""
      upstream_pr:
        description: "upstream PR number (for target_url in the status)"
        required: false
        default: ""
      upstream_sha:
        description: "commit SHA to test (if empty, tests this ref)"
        required: false
        default: ""

concurrency:
  # Serialize per PR branch — a new commit cancels the in-flight run.
  # For upstream-dispatch runs, group by upstream SHA so repeated
  # triggers for the same SHA collapse.
  group: lab-ci-cat8kv-${{ inputs.upstream_sha || github.ref }}
  cancel-in-progress: true

jobs:
  cat8kv:
    runs-on: [self-hosted, lab-cvk]
    timeout-minutes: 25
    env:
      # For upstream dispatch, use the input SHA; otherwise use the
      # PR head or commit SHA.
      SHA: ${{ inputs.upstream_sha || github.event.pull_request.head.sha || github.sha }}
      UPSTREAM_REPO: ${{ inputs.upstream_repo }}
      UPSTREAM_PR: ${{ inputs.upstream_pr }}
      UPSTREAM_SHA: ${{ inputs.upstream_sha }}
      U12: cisco@192.0.2.39
      SSH_KEY: /home/cisco/.ssh/argo_to_u12
      NS: cvk-system
      REL: cvk

    steps:
      - name: Post pending status to upstream PR
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true  # don't abort the test if the secret isn't set
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN secret missing; skipping status post"
            exit 0
          fi
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=pending \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Lab CI Cat8kv running on svr-xl-lab-cvk" \
            -f context="lab-ci / cat8kv" >/dev/null

      - name: Checkout (this ref, for non-dispatch runs)
        if: inputs.upstream_sha == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout upstream commit (dispatch runs)
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}
          fetch-depth: 1

      - name: Stage source onto ubuntu12
        run: |
          set -euo pipefail
          TAG="pr-${SHA:0:12}"
          CR_NAME="cat8kv-pr-${SHA:0:12}"
          POD_NAME="lab-ci-${SHA:0:12}"
          echo "TAG=$TAG"           >> "$GITHUB_ENV"
          echo "CR_NAME=$CR_NAME"   >> "$GITHUB_ENV"
          echo "POD_NAME=$POD_NAME" >> "$GITHUB_ENV"

          git ls-files -z | tar --null -cf - -T - \
            | ssh -i "$SSH_KEY" -o StrictHostKeyChecking=accept-new "$U12" \
                "rm -rf ~/cvk-pr && mkdir ~/cvk-pr && tar -xf - -C ~/cvk-pr"

      - name: Build + push CVK image to local registry on ubuntu12
        run: |
          # Local Docker registry runs at 127.0.0.1:5000 on ubuntu12
          # (persistent container + restart=unless-stopped). k3s is
          # configured via /etc/rancher/k3s/registries.yaml to pull
          # from it without TLS. This replaces the save/import dance
          # and lets containerd share layers across PR images.
          ssh -i "$SSH_KEY" "$U12" "
            set -euo pipefail
            cd ~/cvk-pr
            docker build -t localhost:5000/cisco-vk:${TAG} .
            docker push localhost:5000/cisco-vk:${TAG}
          "

      - name: Helm upgrade --install CVK with PR image
        run: |
          ssh -i "$SSH_KEY" "$U12" "
            set -euo pipefail
            cd ~/cvk-pr
            helm upgrade --install ${REL} ./charts/cisco-virtual-kubelet \
              --namespace ${NS} --create-namespace \
              --set image.repository=localhost:5000/cisco-vk \
              --set image.tag=${TAG} \
              --set image.pullPolicy=IfNotPresent \
              --wait --timeout 3m
            kubectl -n ${NS} rollout status \
              deploy/${REL}-cisco-virtual-kubelet-controller --timeout=2m
          "

      - name: Clean any stale app-hosting state on Cat8kv
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<'REMOTE'
          set -eu
          curl -k -sS -u cisco:cisco \
            "https://192.0.2.60/restconf/data/Cisco-IOS-XE-app-hosting-oper:app-hosting-oper-data/apps" \
            -H "Accept: application/yang-data+json" \
            | python3 -c '
          import json,sys,subprocess
          d=json.load(sys.stdin)
          key=next((k for k in d if "apps" in k),None)
          apps=(d.get(key,{}).get("app",[]) if key else [])
          for a in apps:
              name=a.get("name","")
              if name.startswith("cvk0000_"):
                  for op in ("stop","deactivate","uninstall"):
                      subprocess.run(
                        ["curl","-k","-sS","-u","cisco:cisco","-X","POST",
                         "https://192.0.2.60/restconf/operations/Cisco-IOS-XE-rpc:app-hosting",
                         "-H","Content-Type: application/yang-data+json",
                         "-H","Accept: application/yang-data+json",
                         "-d", json.dumps({"Cisco-IOS-XE-rpc:input":{op:{"appid":name}}})],
                        check=False)
          '
          REMOTE

      - name: Apply CiscoDevice + hello-app Pod, wait for Running
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<REMOTE
          set -euo pipefail

          # CiscoDevice lives in the chart's release namespace so the
          # chart-created VK ServiceAccount is in scope for the pod the
          # controller spawns per device.
          kubectl apply -n ${NS} -f - <<'YAML'
          apiVersion: cisco.vk/v1alpha1
          kind: CiscoDevice
          metadata:
            name: ${CR_NAME}
            namespace: ${NS}
          spec:
            driver: XE
            address: "192.0.2.60"
            port: 443
            username: cisco
            password: cisco
            tls: { enabled: true, insecureSkipVerify: true }
            xe:
              networking:
                interface:
                  type: VirtualPortGroup
                  virtualPortGroup:
                    dhcp: true
                    interface: "0"
                    guestInterface: 0
          YAML

          # Wait for the VK Node (named after the CiscoDevice) to
          # register Ready.
          for i in \$(seq 1 30); do
            kubectl get node ${CR_NAME} >/dev/null 2>&1 && \
            [ "\$(kubectl get node ${CR_NAME} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')" = "True" ] && break
            sleep 5
          done
          kubectl get node ${CR_NAME}

          kubectl apply -n default -f - <<'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${POD_NAME}
            namespace: default
          spec:
            nodeSelector: { kubernetes.io/hostname: ${CR_NAME} }
            tolerations:
            - key: virtual-kubelet.io/provider
              operator: Exists
            - key: node.kubernetes.io/not-ready
              operator: Exists
            - key: node.kubernetes.io/unreachable
              operator: Exists
            containers:
            - name: hello
              image: flash:/hello-app.iosxe.tar
          YAML

          kubectl -n default wait --for=condition=Ready pod/${POD_NAME} --timeout=10m
          kubectl -n default get pod ${POD_NAME} -o wide
          REMOTE

      - name: Teardown (always runs)
        if: always()
        env:
          SSH_OPTS: "-i /home/cisco/.ssh/argo_to_u12 -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"
        run: |
          # Each ssh call wrapped in `timeout` so any single hang is
          # bounded (observed: a kubectl delete via ssh once hung for
          # 15+ min even though `kubectl delete --wait=false` returns
          # in <1s when invoked directly. ServerAliveInterval keeps
          # TCP alive but doesn't kill a hung command — `timeout`
          # does).
          run_ssh() {
            local seconds=$1; shift
            timeout "$seconds" ssh $SSH_OPTS "$U12" "$@" \
              || echo "  ! step exited non-zero or timed out after ${seconds}s"
          }

          echo "teardown: deleting test Pod"
          run_ssh 30 "kubectl -n default delete pod ${POD_NAME} --ignore-not-found --wait=false"

          echo "teardown: deleting CiscoDevice (controller cascade cleans up VK Node + Deployment)"
          run_ssh 30 "kubectl -n ${NS} delete ciscodevice ${CR_NAME} --ignore-not-found --wait=false"

          echo "teardown: removing source tree"
          run_ssh 15 "rm -rf ~/cvk-pr"

          echo "teardown: pruning dangling docker layers on ubuntu12"
          # GC of tagged pr-*/mq-* images in containerd is no longer
          # needed — k3s now pulls from the local registry and
          # containerd GC's blobs automatically. docker still caches
          # build layers, so prune to keep disk under control.
          run_ssh 60 "docker image prune -f >/dev/null 2>&1 || true"

          echo "teardown: done"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<REMOTE > diagnostics.txt 2>&1 || true
          kubectl get nodes -o wide
          kubectl get pods -A
          kubectl get ciscodevices -A
          kubectl -n ${NS} describe deploy ${REL}-cisco-virtual-kubelet-controller || true
          kubectl -n ${NS} logs deploy/${REL}-cisco-virtual-kubelet-controller --tail=200 || true
          kubectl -n default describe pod ${POD_NAME} || true
          REMOTE
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: diagnostics
          path: diagnostics.txt

      - name: Post final status to upstream PR
        if: always() && inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN secret missing; skipping status post"
            exit 0
          fi
          case "${{ job.status }}" in
            success)   STATE=success; DESC="Lab CI Cat8kv passed" ;;
            failure)   STATE=failure; DESC="Lab CI Cat8kv failed" ;;
            *)         STATE=error;   DESC="Lab CI Cat8kv ${{ job.status }}" ;;
          esac
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=$STATE \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="$DESC" \
            -f context="lab-ci / cat8kv" >/dev/null
