# Cat8kv lab CI — thin trigger for the cat8kv-pr-test Argo
# WorkflowTemplate.
#
# Division of labor: GitHub Actions owns PR status + comment
# plumbing; the WorkflowTemplate (in cvk-gitops, synced to svr-xl
# via Argo CD) owns what a test actually does. When scenarios get
# added or changed, edit the template in cvk-gitops — this file
# doesn't change.
#
# Nightly cron on svr-xl exercises the same WorkflowTemplate with
# fork/main's HEAD SHA, so "did anything regress overnight?" runs
# exactly the same logic as "does this PR pass?".
name: Lab CI (Cat8kv)

on:
  pull_request:
    branches: [main]
  merge_group:
  # Triggered by the upstream-PR bridge (scripts/upstream-pr-bridge.sh
  # on svr-xl) for each new head SHA on open cisco-open PRs.
  workflow_dispatch:
    inputs:
      upstream_repo:
        required: false
        default: ""
      upstream_pr:
        required: false
        default: ""
      upstream_sha:
        required: false
        default: ""

concurrency:
  # Serialize per PR branch (new commit cancels in-flight). For
  # upstream-dispatch runs, group by upstream SHA so repeated
  # triggers for the same SHA collapse. Also matches device-level
  # semaphore inside the WorkflowTemplate.
  group: cat8kv-device-${{ inputs.upstream_sha || github.ref }}
  cancel-in-progress: true

jobs:
  cat8kv:
    runs-on: [self-hosted, lab-cvk]
    timeout-minutes: 40
    env:
      SHA: ${{ inputs.upstream_sha || github.event.pull_request.head.sha || github.sha }}
      UPSTREAM_REPO: ${{ inputs.upstream_repo || github.repository }}
      UPSTREAM_PR: ${{ inputs.upstream_pr }}
      UPSTREAM_SHA: ${{ inputs.upstream_sha }}
      PATH: /home/cisco/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Post pending status to upstream PR
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN missing; skipping status"
            exit 0
          fi
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=pending \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Lab CI Cat8kv running" \
            -f context="lab-ci / cat8kv" >/dev/null

      - name: Submit WorkflowTemplate and wait
        id: argo
        run: |
          set -euo pipefail
          NAME=$(argo submit -n virtual-kubelet-ci \
            --from WorkflowTemplate/cat8kv-pr-test \
            -p upstream_repo="${UPSTREAM_REPO}" \
            -p upstream_sha="${SHA}" \
            -p upstream_pr="${UPSTREAM_PR:-local}" \
            --generate-name "cat8kv-${SHA:0:8}-" \
            -o name | sed 's|^workflow.argoproj.io/||')
          echo "workflow=$NAME" >> "$GITHUB_OUTPUT"
          echo "Submitted: $NAME"
          argo watch -n virtual-kubelet-ci "$NAME"
          PHASE=$(argo get -n virtual-kubelet-ci "$NAME" -o json | jq -r '.status.phase')
          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"
          [ "$PHASE" = "Succeeded" ]

      - name: Capture workflow logs on failure
        if: failure() && steps.argo.outputs.workflow != ''
        continue-on-error: true
        run: |
          argo logs -n virtual-kubelet-ci "${{ steps.argo.outputs.workflow }}" > argo-logs.txt 2>&1 || true
          head -200 argo-logs.txt
      - uses: actions/upload-artifact@v4
        if: failure() && steps.argo.outputs.workflow != ''
        with:
          name: argo-logs-cat8kv
          path: argo-logs.txt

      - name: Post final status to upstream PR
        if: always() && inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN missing; skipping status"
            exit 0
          fi
          case "${{ job.status }}" in
            success)   STATE=success; DESC="Lab CI Cat8kv passed" ;;
            failure)   STATE=failure; DESC="Lab CI Cat8kv failed" ;;
            *)         STATE=error;   DESC="Lab CI Cat8kv ${{ job.status }}" ;;
          esac
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=$STATE \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="$DESC" \
            -f context="lab-ci / cat8kv" >/dev/null

      - name: Upsert Lab CI report comment on upstream PR
        if: always() && inputs.upstream_sha != '' && inputs.upstream_pr != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_SHA: ${{ inputs.upstream_sha }}
          UPSTREAM_PR: ${{ inputs.upstream_pr }}
          FORK_REPO: ${{ github.repository }}
        run: python3 .github/scripts/post-pr-report.py
