# Pre-merge device validation on Cat8kv (Tier 2).
#
# Runs on every PR. Builds the PR's CVK from source on ubuntu12,
# deploys it into a PR-scoped namespace, applies a CiscoDevice CR for
# the test Cat8kv, and asserts a hello-app Pod reaches Running. All
# CVK/docker/helm work happens on ubuntu12 via SSH per the hard-split
# rule; the runner on svr-xl orchestrates and reports status.
#
# Destination: .github/workflows/lab-ci-cat8kv.yaml in the
# cisco-virtual-kubelet repo (or your fork).

name: Lab CI (Cat8kv)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Serialize runs per PR — if a new commit lands, cancel the
# in-flight run and start over.
concurrency:
  group: lab-ci-cat8kv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cat8kv:
    runs-on: [self-hosted, lab-cvk]
    timeout-minutes: 25
    env:
      # Identifiers unique to this run: used to name Docker tag, k8s
      # namespace, and helm release so concurrent PRs stay isolated.
      SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      U12: cisco@192.0.2.39
      SSH_KEY: /home/cisco/.ssh/argo_to_u12

    steps:
      - name: Checkout PR source
        uses: actions/checkout@v4
        with:
          # Runner is ephemeral, so we don't risk code leakage between
          # jobs, but keep fetch-depth shallow for speed.
          fetch-depth: 1

      - name: Stage source onto ubuntu12
        run: |
          set -euo pipefail
          TAG="pr-${SHA:0:12}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "NS=cvk-$TAG"  >> "$GITHUB_ENV"
          echo "REL=cvk-$TAG" >> "$GITHUB_ENV"

          # Stream the working tree into ubuntu12 via tar-over-ssh.
          # Avoids scp's recursive directory overhead; respects
          # .gitignore equivalents by using git ls-files.
          git ls-files -z | tar --null -cf - -T - \
            | ssh -i "$SSH_KEY" -o StrictHostKeyChecking=accept-new "$U12" \
                "rm -rf ~/cvk-pr && mkdir ~/cvk-pr && tar -xf - -C ~/cvk-pr"

      - name: Build CVK image on ubuntu12
        run: |
          ssh -i "$SSH_KEY" "$U12" "
            set -euo pipefail
            cd ~/cvk-pr
            docker build -t cisco-vk:${TAG} .
            docker save cisco-vk:${TAG} -o /tmp/cvk-${TAG}.tar
            sudo k3s ctr images import /tmp/cvk-${TAG}.tar
            rm -f /tmp/cvk-${TAG}.tar
          "

      - name: Helm install CVK (PR-scoped)
        run: |
          ssh -i "$SSH_KEY" "$U12" "
            set -euo pipefail
            cd ~/cvk-pr
            helm install ${REL} ./charts/cisco-virtual-kubelet \
              --namespace ${NS} --create-namespace \
              --set image.repository=cisco-vk \
              --set image.tag=${TAG} \
              --set image.pullPolicy=Never \
              --wait --timeout 3m
          "

      - name: Clean any stale app-hosting state on Cat8kv
        run: |
          # Uninstall any apps the device still has from prior runs.
          # Safe against a clean device (no-ops if no apps present).
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<'REMOTE'
          set -eu
          curl -k -sS -u cisco:cisco \
            "https://192.0.2.60/restconf/data/Cisco-IOS-XE-app-hosting-oper:app-hosting-oper-data/apps" \
            -H "Accept: application/yang-data+json" \
            | python3 -c '
          import json,sys,subprocess
          d=json.load(sys.stdin)
          key=next((k for k in d if "apps" in k),None)
          apps=(d.get(key,{}).get("app",[]) if key else [])
          for a in apps:
              name=a.get("name","")
              if name.startswith("cvk0000_"):
                  for op in ("stop","deactivate","uninstall"):
                      subprocess.run(
                        ["curl","-k","-sS","-u","cisco:cisco","-X","POST",
                         f"https://192.0.2.60/restconf/operations/Cisco-IOS-XE-rpc:app-hosting",
                         "-H","Content-Type: application/yang-data+json",
                         "-H","Accept: application/yang-data+json",
                         "-d", json.dumps({"Cisco-IOS-XE-rpc:input":{op:{"appid":name}}})],
                        check=False)
          '
          REMOTE

      - name: Apply CiscoDevice + hello-app Pod, wait for Running
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<REMOTE
          set -euo pipefail
          kubectl apply -n ${NS} -f - <<'YAML'
          apiVersion: cisco.vk/v1alpha1
          kind: CiscoDevice
          metadata:
            name: cat8kv-test
            namespace: ${NS}
          spec:
            driver: XE
            address: "192.0.2.60"
            port: 443
            username: cisco
            password: cisco
            tls: { enabled: true, insecureSkipVerify: true }
            xe:
              networking:
                interface:
                  type: VirtualPortGroup
                  virtualPortGroup:
                    dhcp: true
                    interface: "0"
                    guestInterface: 0
          YAML

          # Wait for the VK Node to register Ready.
          for i in \$(seq 1 30); do
            kubectl get node cat8kv-test >/dev/null 2>&1 && \
            [ "\$(kubectl get node cat8kv-test -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')" = "True" ] && break
            sleep 5
          done
          kubectl get node cat8kv-test

          kubectl apply -n default -f - <<'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: lab-ci-${TAG}
            namespace: default
          spec:
            nodeSelector: { kubernetes.io/hostname: cat8kv-test }
            tolerations:
            - key: virtual-kubelet.io/provider
              operator: Exists
            - key: node.kubernetes.io/not-ready
              operator: Exists
            - key: node.kubernetes.io/unreachable
              operator: Exists
            containers:
            - name: hello
              image: flash:/hello-app.iosxe.tar
          YAML

          # Bounded wait for Running — real hardware takes time.
          kubectl -n default wait --for=condition=Ready pod/lab-ci-${TAG} --timeout=10m
          kubectl -n default get pod lab-ci-${TAG} -o wide
          REMOTE

      - name: Teardown (always runs)
        if: always()
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<REMOTE || true
          set -u
          kubectl -n default delete pod lab-ci-${TAG} --ignore-not-found --wait=false || true
          kubectl -n ${NS} delete ciscodevice --all --ignore-not-found --wait=false || true
          # Helm uninstall drops the VK deployment + SA + RBAC.
          helm uninstall ${REL} --namespace ${NS} --wait || true
          kubectl delete namespace ${NS} --ignore-not-found --wait=false || true
          # Drop the PR-tagged image from containerd — don't fill disk.
          sudo k3s ctr images rm docker.io/library/cisco-vk:${TAG} || true
          rm -rf ~/cvk-pr || true
          REMOTE

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<REMOTE > diagnostics.txt 2>&1 || true
          kubectl get nodes -o wide
          kubectl get pods -A
          kubectl get ciscodevices -A
          kubectl -n ${NS} describe deploy || true
          kubectl -n ${NS} logs deploy/cvk-cisco-virtual-kubelet-controller --tail=200 || true
          REMOTE
          # Surface the file as a run artifact.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: diagnostics
          path: diagnostics.txt
