# Thin trigger for the cat9k-pr-test Argo WorkflowTemplate.
#
# Analogous to lab-ci-cat8kv-v2.yaml — GitHub Actions owns PR
# status/comment plumbing; the WorkflowTemplate (in cvk-gitops,
# synced to svr-xl via Argo CD) is the single source of truth for
# what a Cat9k PR test does.
#
# Runs alongside lab-ci-cat9k.yaml (v1) during validation. Once v2
# proves itself, v1 can be retired.
name: Lab CI (Cat9k v2)

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      upstream_repo:
        required: false
        default: ""
      upstream_pr:
        required: false
        default: ""
      upstream_sha:
        required: false
        default: ""

concurrency:
  # Shares the group with v1 so we never double-book the single
  # physical Cat9k. The template also holds cat9k-test semaphore.
  group: cat9k-device
  cancel-in-progress: false

jobs:
  cat9k-v2:
    runs-on: [self-hosted, lab-cvk]
    timeout-minutes: 35
    env:
      SHA: ${{ inputs.upstream_sha || github.sha }}
      UPSTREAM_REPO: ${{ inputs.upstream_repo || github.repository }}
      UPSTREAM_PR: ${{ inputs.upstream_pr }}
      UPSTREAM_SHA: ${{ inputs.upstream_sha }}
      PATH: /home/cisco/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Post pending status to upstream PR
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN missing; skipping status"
            exit 0
          fi
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=pending \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Lab CI Cat9k (v2) running" \
            -f context="lab-ci / cat9k-v2" >/dev/null

      - name: Submit WorkflowTemplate and wait
        id: argo
        run: |
          set -euo pipefail
          NAME=$(argo submit -n virtual-kubelet-ci \
            --from WorkflowTemplate/cat9k-pr-test \
            -p upstream_repo="${UPSTREAM_REPO}" \
            -p upstream_sha="${SHA}" \
            -p upstream_pr="${UPSTREAM_PR:-local}" \
            --generate-name "cat9k-${SHA:0:8}-" \
            -o name | sed 's|^workflow.argoproj.io/||')
          echo "workflow=$NAME" >> "$GITHUB_OUTPUT"
          echo "Submitted: $NAME"
          argo watch -n virtual-kubelet-ci "$NAME"
          PHASE=$(argo get -n virtual-kubelet-ci "$NAME" -o json | jq -r '.status.phase')
          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"
          [ "$PHASE" = "Succeeded" ]

      - name: Capture workflow logs on failure
        if: failure() && steps.argo.outputs.workflow != ''
        continue-on-error: true
        run: |
          argo logs -n virtual-kubelet-ci "${{ steps.argo.outputs.workflow }}" > argo-logs.txt 2>&1 || true
          head -200 argo-logs.txt
      - uses: actions/upload-artifact@v4
        if: failure() && steps.argo.outputs.workflow != ''
        with:
          name: argo-logs-cat9k-v2
          path: argo-logs.txt

      - name: Post final status to upstream PR
        if: always() && inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN missing; skipping status"
            exit 0
          fi
          case "${{ job.status }}" in
            success)   STATE=success; DESC="Lab CI Cat9k (v2) passed" ;;
            failure)   STATE=failure; DESC="Lab CI Cat9k (v2) failed" ;;
            *)         STATE=error;   DESC="Lab CI Cat9k (v2) ${{ job.status }}" ;;
          esac
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=$STATE \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="$DESC" \
            -f context="lab-ci / cat9k-v2" >/dev/null
