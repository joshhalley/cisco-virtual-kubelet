# Tier 1 — fast, hermetic, runs on GitHub-hosted Linux.
# No devices, no lab. Blocks merges on trivial Go regressions.
#
# Also triggered by the upstream-PR bridge for PRs on
# cisco-open/cisco-virtual-kubelet (via `workflow_dispatch` with
# upstream_sha/upstream_pr/upstream_repo inputs). In that mode the
# workflow checks out the upstream commit and posts a commit status
# back to the upstream PR so external PR authors see the same gate.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "upstream repo (owner/repo); empty = test this ref"
        required: false
        default: ""
      upstream_pr:
        description: "upstream PR number (for target_url on the status)"
        required: false
        default: ""
      upstream_sha:
        description: "commit SHA to test; empty = HEAD of this branch"
        required: false
        default: ""

concurrency:
  # For upstream-dispatch runs, group by upstream SHA so repeat
  # triggers for the same SHA collapse. For normal events, group
  # by the event's ref.
  group: ci-${{ inputs.upstream_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UPSTREAM_REPO: ${{ inputs.upstream_repo }}
      UPSTREAM_PR: ${{ inputs.upstream_pr }}
      UPSTREAM_SHA: ${{ inputs.upstream_sha }}
    steps:
      - name: Post pending status to upstream PR
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN secret missing; skipping status post"
            exit 0
          fi
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=pending \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="CI unit tests running" \
            -f context="lab-ci / unit-tests" >/dev/null

      - name: Checkout (this ref)
        if: inputs.upstream_sha == ''
        uses: actions/checkout@v4
      - name: Checkout upstream commit
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (race, coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Post final status to upstream PR
        if: always() && inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN secret missing; skipping status post"
            exit 0
          fi
          case "${{ job.status }}" in
            success)   STATE=success; DESC="CI unit tests passed" ;;
            failure)   STATE=failure; DESC="CI unit tests failed" ;;
            *)         STATE=error;   DESC="CI unit tests ${{ job.status }}" ;;
          esac
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=$STATE \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="$DESC" \
            -f context="lab-ci / unit-tests" >/dev/null

  lint:
    # Advisory: report findings as warnings without failing the
    # check. golangci-lint-action's pre-built binary lags Go
    # releases (v1.64.8, last available, was built with Go 1.24
    # which can't lint go 1.25.0 code), so we `go install` the
    # latest source so it's built against the project's Go version.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (this ref)
        if: inputs.upstream_sha == ''
        uses: actions/checkout@v4
      - name: Checkout upstream commit
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install golangci-lint (built with project Go version)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint (advisory; does not fail check)
        run: |
          # `--issues-exit-code 0` keeps the check green; findings
          # surface as inline annotations on changed lines via the
          # github-actions output format. Operators see issues
          # without a constant red-X driving alert fatigue.
          golangci-lint run --issues-exit-code 0 --out-format=github-actions ./... \
            | tee golangci-report.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golangci-report
          path: golangci-report.txt

  vuln:
    # Advisory: govulncheck reports Go stdlib and module CVEs.
    # Findings often require a Go-version bump (out of CI scope), so
    # we surface them as artifacts/annotations without failing the
    # check. Keeps signal visible without alert fatigue.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (this ref)
        if: inputs.upstream_sha == ''
        uses: actions/checkout@v4
      - name: Checkout upstream commit
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck (advisory; uploads report)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Keep the check green; findings live in the report artifact
          # and the run summary.
          govulncheck ./... > govulncheck-report.txt 2>&1 || true
          echo "## govulncheck summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -50 govulncheck-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: govulncheck-report
          path: govulncheck-report.txt
