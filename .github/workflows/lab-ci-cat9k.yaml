# Pre-merge device validation on physical Cat9k (Tier 3).
#
# Triggers on GitHub merge queue events (gates the actual merge
# without blocking PR development) and on workflow_dispatch for
# release-candidate runs.
#
# Serial by design: one physical Cat9k. A workflow-level concurrency
# group `cat9k-device` ensures at most one run uses the device at a
# time, globally.
#
# Single shared `cvk` helm release in `cvk-system` — see
# lab-ci-cat8kv.yaml for the rationale.

name: Lab CI (Cat9k)

on:
  merge_group:
  # Dispatched by the upstream-PR bridge when a PR on
  # cisco-open/cisco-virtual-kubelet carries the `test-cat9k` label
  # (bridge filters). Also manually via `gh workflow run`.
  workflow_dispatch:
    inputs:
      upstream_repo:
        required: false
        default: ""
      upstream_pr:
        required: false
        default: ""
      upstream_sha:
        required: false
        default: ""

concurrency:
  group: cat9k-device
  cancel-in-progress: false

jobs:
  cat9k:
    runs-on: [self-hosted, lab-cvk]
    timeout-minutes: 40
    env:
      SHA: ${{ inputs.upstream_sha || github.sha }}
      UPSTREAM_REPO: ${{ inputs.upstream_repo }}
      UPSTREAM_PR: ${{ inputs.upstream_pr }}
      UPSTREAM_SHA: ${{ inputs.upstream_sha }}
      U12: cisco@192.0.2.39
      SSH_KEY: /home/cisco/.ssh/argo_to_u12
      NS: cvk-system
      REL: cvk

    steps:
      - name: Post pending status to upstream PR
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN secret missing; skipping status post"
            exit 0
          fi
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=pending \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Lab CI Cat9k running" \
            -f context="lab-ci / cat9k" >/dev/null

      - name: Checkout (merge_group / non-dispatch)
        if: inputs.upstream_sha == ''
        uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - name: Checkout upstream commit (dispatch)
        if: inputs.upstream_sha != '' && inputs.upstream_repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}
          fetch-depth: 1

      - name: Stage source onto ubuntu12
        run: |
          set -euo pipefail
          TAG="mq-${SHA:0:12}"
          CR_NAME="cat9k-mq-${SHA:0:12}"
          POD_NAME="lab-ci-mq-${SHA:0:12}"
          echo "TAG=$TAG"           >> "$GITHUB_ENV"
          echo "CR_NAME=$CR_NAME"   >> "$GITHUB_ENV"
          echo "POD_NAME=$POD_NAME" >> "$GITHUB_ENV"
          git ls-files -z | tar --null -cf - -T - \
            | ssh -i "$SSH_KEY" -o StrictHostKeyChecking=accept-new "$U12" \
                "rm -rf ~/cvk-mq && mkdir ~/cvk-mq && tar -xf - -C ~/cvk-mq"

      - name: Build + push CVK image to local registry
        run: |
          ssh -i "$SSH_KEY" "$U12" "
            set -euo pipefail
            cd ~/cvk-mq
            docker build -t localhost:5000/cisco-vk:${TAG} .
            docker push localhost:5000/cisco-vk:${TAG}
          "

      - name: Helm upgrade --install CVK
        run: |
          ssh -i "$SSH_KEY" "$U12" "
            set -euo pipefail
            cd ~/cvk-mq
            helm upgrade --install ${REL} ./charts/cisco-virtual-kubelet \
              --namespace ${NS} --create-namespace \
              --set image.repository=localhost:5000/cisco-vk \
              --set image.tag=${TAG} \
              --set image.pullPolicy=IfNotPresent \
              --wait --timeout 3m
            kubectl -n ${NS} rollout status \
              deploy/${REL}-cisco-virtual-kubelet-controller --timeout=2m
          "

      - name: Clean any stale app-hosting state on Cat9k
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<'REMOTE'
          set -eu
          curl -k -sS -u AI_AGENT_RW:cisco \
            "https://198.51.100.102/restconf/data/Cisco-IOS-XE-app-hosting-oper:app-hosting-oper-data/apps" \
            -H "Accept: application/yang-data+json" \
            | python3 -c '
          import json,sys,subprocess
          d=json.load(sys.stdin)
          key=next((k for k in d if "apps" in k),None)
          apps=(d.get(key,{}).get("app",[]) if key else [])
          for a in apps:
              name=a.get("name","")
              if name.startswith("cvk0000_"):
                  for op in ("stop","deactivate","uninstall"):
                      subprocess.run(
                        ["curl","-k","-sS","-u","AI_AGENT_RW:cisco","-X","POST",
                         "https://198.51.100.102/restconf/operations/Cisco-IOS-XE-rpc:app-hosting",
                         "-H","Content-Type: application/yang-data+json",
                         "-H","Accept: application/yang-data+json",
                         "-d", json.dumps({"Cisco-IOS-XE-rpc:input":{op:{"appid":name}}})],
                        check=False)
          '
          REMOTE

      - name: Apply CiscoDevice + hello-app Pod, wait for Running
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<REMOTE
          set -euo pipefail
          kubectl apply -n ${NS} -f - <<'YAML'
          apiVersion: cisco.vk/v1alpha1
          kind: CiscoDevice
          metadata:
            name: ${CR_NAME}
            namespace: ${NS}
          spec:
            driver: XE
            address: "198.51.100.102"
            port: 443
            username: AI_AGENT_RW
            password: cisco
            tls: { enabled: true, insecureSkipVerify: true }
            xe:
              networking:
                interface:
                  type: AppGigabitEthernet
                  appGigabitEthernet:
                    mode: access
                    dhcp: true
                    guestInterface: 0
          YAML

          for i in \$(seq 1 30); do
            kubectl get node ${CR_NAME} >/dev/null 2>&1 && \
            [ "\$(kubectl get node ${CR_NAME} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')" = "True" ] && break
            sleep 5
          done
          kubectl get node ${CR_NAME}

          kubectl apply -n default -f - <<'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${POD_NAME}
            namespace: default
          spec:
            nodeSelector: { kubernetes.io/hostname: ${CR_NAME} }
            tolerations:
            - key: virtual-kubelet.io/provider
              operator: Exists
            - key: node.kubernetes.io/not-ready
              operator: Exists
            - key: node.kubernetes.io/unreachable
              operator: Exists
            containers:
            - name: hello
              image: flash:/hello-app.iosxe.tar
          YAML

          kubectl -n default wait --for=condition=Ready pod/${POD_NAME} --timeout=15m
          kubectl -n default get pod ${POD_NAME} -o wide
          REMOTE

      - name: Teardown (always)
        if: always()
        env:
          SSH_OPTS: "-i /home/cisco/.ssh/argo_to_u12 -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"
        run: |
          run_ssh() {
            local seconds=$1; shift
            timeout "$seconds" ssh $SSH_OPTS "$U12" "$@" \
              || echo "  ! step exited non-zero or timed out after ${seconds}s"
          }

          echo "teardown: deleting test Pod"
          run_ssh 30 "kubectl -n default delete pod ${POD_NAME} --ignore-not-found --wait=false"

          echo "teardown: deleting CiscoDevice"
          run_ssh 30 "kubectl -n ${NS} delete ciscodevice ${CR_NAME} --ignore-not-found --wait=false"

          echo "teardown: removing source tree"
          run_ssh 15 "rm -rf ~/cvk-mq"

          echo "teardown: pruning dangling docker layers on ubuntu12"
          # k3s now pulls from the local registry; no containerd
          # tag-level cleanup needed. docker still caches build layers.
          run_ssh 60 "docker image prune -f >/dev/null 2>&1 || true"

          echo "teardown: done"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          ssh -i "$SSH_KEY" "$U12" "bash -s" <<REMOTE > diagnostics.txt 2>&1 || true
          kubectl get nodes -o wide
          kubectl get pods -A
          kubectl get ciscodevices -A
          kubectl -n ${NS} describe deploy ${REL}-cisco-virtual-kubelet-controller || true
          kubectl -n ${NS} logs deploy/${REL}-cisco-virtual-kubelet-controller --tail=200 || true
          kubectl -n default describe pod ${POD_NAME} || true
          REMOTE
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: diagnostics-cat9k
          path: diagnostics.txt

      - name: Post final status to upstream PR
        if: always() && inputs.upstream_sha != '' && inputs.upstream_repo != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::UPSTREAM_STATUS_TOKEN secret missing; skipping status post"
            exit 0
          fi
          case "${{ job.status }}" in
            success)   STATE=success; DESC="Lab CI Cat9k passed" ;;
            failure)   STATE=failure; DESC="Lab CI Cat9k failed" ;;
            *)         STATE=error;   DESC="Lab CI Cat9k ${{ job.status }}" ;;
          esac
          gh api -X POST "repos/${UPSTREAM_REPO}/statuses/${UPSTREAM_SHA}" \
            -f state=$STATE \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="$DESC" \
            -f context="lab-ci / cat9k" >/dev/null
