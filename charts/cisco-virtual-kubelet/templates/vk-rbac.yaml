---
# Service account used by all Virtual Kubelet Deployments spawned by the controller.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cisco-virtual-kubelet.vkServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cisco-virtual-kubelet.labels" . | nindent 4 }}
---
# ClusterRole defining the permissions required by Virtual Kubelet pods.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cisco-virtual-kubelet.vkServiceAccountName" . }}
  labels:
    {{- include "cisco-virtual-kubelet.labels" . | nindent 4 }}
rules:
  # Pod operations
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Node operations
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["get", "update", "patch"]
  # ConfigMap and Secret access (for pod volumes)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Service operations (for pod DNS/service discovery)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # PersistentVolumeClaim/PersistentVolume operations
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Events (for logging pod events)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Node leases (required for node heartbeat in kube-node-lease namespace)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# ClusterRoleBinding for the VK service account.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cisco-virtual-kubelet.vkServiceAccountName" . }}
  labels:
    {{- include "cisco-virtual-kubelet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cisco-virtual-kubelet.vkServiceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cisco-virtual-kubelet.vkServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
