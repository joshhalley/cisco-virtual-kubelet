---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cisco-virtual-kubelet.controllerServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cisco-virtual-kubelet.labels" . | nindent 4 }}
---
# ClusterRoleBinding for the controller service account.
# The ClusterRole name is kept in sync with role.yaml (auto-generated by rbac-gen).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cisco-virtual-kubelet.controllerServiceAccountName" . }}
  labels:
    {{- include "cisco-virtual-kubelet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cisco-virtual-kubelet-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "cisco-virtual-kubelet.controllerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
