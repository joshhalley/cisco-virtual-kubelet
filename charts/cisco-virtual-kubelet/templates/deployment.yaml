apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cisco-virtual-kubelet.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cisco-virtual-kubelet.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cisco-virtual-kubelet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "cisco-virtual-kubelet.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "cisco-virtual-kubelet.controllerServiceAccountName" . }}
      containers:
        - name: controller
          image: {{ include "cisco-virtual-kubelet.controllerImage" . }}
          imagePullPolicy: {{ include "cisco-virtual-kubelet.controllerImagePullPolicy" . }}
          command:
            - cisco-vk
            - manager
            - --vk-image={{ include "cisco-virtual-kubelet.vkImage" . }}
            - --vk-service-account={{ include "cisco-virtual-kubelet.vkServiceAccountName" . }}
            - --metrics-bind-address={{ .Values.controller.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.controller.healthProbeBindAddress }}
            {{- if .Values.controller.leaderElect }}
            - --leader-elect
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
