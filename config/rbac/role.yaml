---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cisco-virtual-kubelet-controller
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - delete
  - get
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cisco.vk
  resources:
  - ciscodevices
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cisco.vk
  resources:
  - ciscodevices/status
  verbs:
  - get
  - patch
  - update
