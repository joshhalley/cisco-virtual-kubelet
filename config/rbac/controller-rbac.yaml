# RBAC for the CiscoDevice controller (operator).
# This is separate from vk-rbac.yaml which covers the VK pod itself.
#
# NOTE: The ClusterRole is auto-generated from +kubebuilder:rbac markers via
#       'make rbac-gen' and lives in role.yaml. Do not edit it here.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cisco-virtual-kubelet-controller
  namespace: default
---
# ClusterRoleBinding for the controller service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cisco-virtual-kubelet-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cisco-virtual-kubelet-controller
subjects:
  - kind: ServiceAccount
    name: cisco-virtual-kubelet-controller
    namespace: default
