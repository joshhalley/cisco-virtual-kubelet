---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: ciscodevices.cisco.vk
spec:
  group: cisco.vk
  names:
    kind: CiscoDevice
    listKind: CiscoDeviceList
    plural: ciscodevices
    shortNames:
    - cvk
    singular: ciscodevice
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.driver
      name: Driver
      type: string
    - jsonPath: .spec.address
      name: Address
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CiscoDevice is the Schema for the ciscodevices API.
          It represents a single Cisco device managed by the virtual kubelet operator.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DeviceSpec defines the desired state of a Cisco device.
              Shared fields are common to all drivers; driver-specific networking
              configuration lives under the corresponding driver section (XE, XR, etc.).
            properties:
              address:
                description: Address is the management IP or hostname of the device.
                type: string
              credentialSecretRef:
                description: |-
                  CredentialSecretRef references a Secret containing device credentials.
                  Used by the controller when creating VK deployments from CRDs.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              driver:
                allOf:
                - enum:
                  - XE
                  - XR
                  - NXOS
                  - FAKE
                - enum:
                  - XE
                  - XR
                  - NXOS
                  - FAKE
                type: string
              labels:
                additionalProperties:
                  type: string
                description: Labels to apply to the virtual kubelet node.
                type: object
              logLevel:
                default: info
                description: |-
                  LogLevel sets the logging verbosity for the VK instance.
                  Valid values are: debug, info, warn, error.
                enum:
                - debug
                - info
                - warn
                - error
                type: string
              maxPods:
                default: 16
                description: MaxPods is the maximum number of pods the device can
                  host.
                format: int32
                type: integer
              password:
                description: |-
                  Password for device authentication.
                  In CRD mode the controller should source this from a Secret reference.
                type: string
              podCIDR:
                description: PodCIDR is the CIDR to use for pod network interfaces
                  when using static IP allocation.
                type: string
              port:
                description: 'Port for device communication (default: 443 for TLS,
                  80 otherwise).'
                maximum: 65535
                minimum: 1
                type: integer
              region:
                description: Region for node topology.
                type: string
              resourceLimits:
                description: ResourceLimits defines default and maximum resource allocations.
                properties:
                  defaultCPU:
                    type: string
                  defaultMemory:
                    type: string
                  defaultStorage:
                    type: string
                  maxCPU:
                    type: string
                  maxMemory:
                    type: string
                  maxStorage:
                    type: string
                  others:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              taints:
                description: Taints to apply to the virtual kubelet node.
                items:
                  description: |-
                    The node this Taint is attached to has the "effect" on
                    any pod that does not tolerate the Taint.
                  properties:
                    effect:
                      description: |-
                        Required. The effect of the taint on pods
                        that do not tolerate the taint.
                        Valid effects are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: Required. The taint key to be applied to a node.
                      type: string
                    timeAdded:
                      description: TimeAdded represents the time at which the taint
                        was added.
                      format: date-time
                      type: string
                    value:
                      description: The taint value corresponding to the taint key.
                      type: string
                  required:
                  - effect
                  - key
                  type: object
                type: array
              tls:
                description: TLS configuration for device communication.
                properties:
                  caFile:
                    description: CAFile is the path to the CA certificate file.
                    type: string
                  certFile:
                    description: CertFile is the path to the client certificate file.
                    type: string
                  enabled:
                    description: Enabled toggles TLS for device communication.
                    type: boolean
                  insecureSkipVerify:
                    description: InsecureSkipVerify disables TLS certificate verification.
                    type: boolean
                  keyFile:
                    description: KeyFile is the path to the client key file.
                    type: string
                required:
                - enabled
                type: object
              username:
                description: Username for device authentication.
                type: string
              xe:
                description: |-
                  XE holds IOS-XE specific networking configuration.
                  Required when driver=XE.
                properties:
                  networking:
                    description: Networking holds the IOS-XE networking configuration.
                    properties:
                      interface:
                        description: Interface holds the interface-level configuration.
                        properties:
                          appGigabitEthernet:
                            description: AppGigabitEthernet configuration (when type=AppGigabitEthernet).
                            properties:
                              dhcp:
                                description: Dhcp enables DHCP when in access mode
                                  without a VLAN interface.
                                type: boolean
                              guestInterface:
                                description: GuestInterface number inside the container
                                  (optional, defaults to 0).
                                maximum: 3
                                type: integer
                              mode:
                                allOf:
                                - enum:
                                  - access
                                  - trunk
                                - enum:
                                  - access
                                  - trunk
                                description: Mode specifies access or trunk mode.
                                type: string
                              vlanIf:
                                description: VlanIf holds VLAN-specific configuration.
                                properties:
                                  dhcp:
                                    description: Dhcp enables DHCP for the VLAN interface.
                                    type: boolean
                                  guestInterface:
                                    description: GuestInterface number inside the
                                      container (optional, defaults to 0).
                                    maximum: 3
                                    type: integer
                                  macForwardingEnabled:
                                    description: MacForwardingEnabled enables MAC
                                      address forwarding.
                                    type: boolean
                                  mirrorEnabled:
                                    description: MirrorEnabled enables port mirroring.
                                    type: boolean
                                  multicastEnabled:
                                    description: MulticastEnabled enables multicast
                                      traffic.
                                    type: boolean
                                  vlan:
                                    description: Vlan ID for the interface.
                                    maximum: 4094
                                    minimum: 0
                                    type: integer
                                required:
                                - dhcp
                                type: object
                            required:
                            - mode
                            type: object
                          management:
                            description: Management configuration (when type=Management).
                            properties:
                              dhcp:
                                description: Dhcp enables DHCP for the Management
                                  interface.
                                type: boolean
                              guestInterface:
                                description: GuestInterface number inside the container
                                  (optional, defaults to 0).
                                maximum: 3
                                type: integer
                            required:
                            - dhcp
                            type: object
                          type:
                            description: Type specifies which interface type is configured.
                            enum:
                            - VirtualPortGroup
                            - AppGigabitEthernet
                            - Management
                            type: string
                          virtualPortGroup:
                            description: VirtualPortGroup configuration (when type=VirtualPortGroup).
                            properties:
                              dhcp:
                                description: Dhcp enables DHCP for the VirtualPortGroup
                                  interface.
                                type: boolean
                              guestInterface:
                                description: GuestInterface number inside the container
                                  (optional, defaults to 0).
                                maximum: 3
                                type: integer
                              interface:
                                description: Interface number (0-3 for VirtualPortGroup0-3).
                                type: string
                            required:
                            - dhcp
                            type: object
                        required:
                        - type
                        type: object
                    type: object
                required:
                - networking
                type: object
              zone:
                description: Zone for node topology.
                type: string
            required:
            - address
            - driver
            - username
            type: object
          status:
            description: DeviceStatus defines the observed state of a CiscoDevice.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the device's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase represents the current lifecycle phase of the device.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Error
                - Deleting
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
