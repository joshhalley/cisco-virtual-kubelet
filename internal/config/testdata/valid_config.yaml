device:
  driver: XE
  address: localhost
  port: 80
  username: admin
  password: admin
  logLevel: debug
  tls:
    enabled: true
    insecureSkipVerify: true
  xe:
    networking:
      interface:
        type: VirtualPortGroup
        virtualPortGroup:
          dhcp: true
          interface: "0"
          guestInterface: 0
